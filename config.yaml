# IsoKernel Master Configuration

pipeline:
  run_phase_1: true
  run_phase_2: true
  run_phase_4: true
  max_concurrent_llm_calls: 4
  
extraction:
  domain: "general knowledge"
  max_retries: 3
  theme_chunk_max_words: 4000
  triple_chunk_max_words: 1000
  
refinement:
  # Semantic Embedding Parameters
  use_embeddings: true
  embedding_model: "jinaai/jina-embeddings-v2-small-en"
  clustering_method: "agglomerative"  # or "hdbscan"
  # similarity_threshold: Minimum cosine similarity measure required (0.0 to 1.0) to map two string variants together. Higher means stricter mapping.
  similarity_threshold: 0.8
  
  # compression_mode: 
  # - "isolated": Clusters and deduplicates strings within their own specific silo (subjects with subjects, predicates with predicates).
  # - "unified": Lumps everything together into a giant pool before measuring semantic distance.
  compression_mode: "isolated"
  
  # compress_fields: Choose exactly which fields across the triplet architecture to run semantic deduplication on.
  # Options: "subject", "object", "predicate". Leave empty [] to skip compression entirely without disabling model loading.
  compress_fields: ["subject", "object", "predicate"]
  
  # Spectral Vector Geometry
  # Aggressive mathematical tensor decomposition. Identifies the "Principal Eigenvectors" to actively drop linguistic noise from LLM embeddings prior to calculating Semantic Centroids.
  use_spectral_decomposition: true
  spectral_components: 12 
  
  # hypernym_resolution: Mechanism for determining the definitive string label representation of a cluster group.
  # - "semantic_centroid": (Default) Calculates local mathematical vector centroids, then formally attempts Taxonomic Lifting via LLM to find the "Is-A" Concept.
  # - "llm_resolution": Uses the configured LLM to comprehensively find the best generalizable semantic label across all node texts organically regardless of strict deductive rules.
  # - "most_frequent": Automatically maps the cluster to the string that historically occurred the most times locally.
  # - "shortest_string": Mappings resolve simply to whichever literal text length was mathematically shortest (Legacy Option).
  hypernym_resolution: "semantic_centroid"

  # Graph Topology (Community Density Physics)
  community_detection: "louvain"  # Algorithms to assign community clusters (e.g., "louvain", "leiden", "spectral")
  
output:
  logs_dir: "data/outputs/logs"
  themes_dir: "data/outputs/themes"
  schemas_dir: "data/outputs/schemas"
  graphs_dir: "data/outputs/graphs"
